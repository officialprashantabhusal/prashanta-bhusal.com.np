  <style>
    :root{
      --bg:#070707;
      --card:#111111;
      --muted:#9d9d9d;
      --accent:#ff7a3d;
      --accent-600:#e65d2a;
      --border:rgba(255,255,255,0.08);
      --gap:18px;
      --radius:16px;
      --glass:rgba(255,255,255,0.03);
    }
    *{box-sizing:border-box}
    html,body{min-height:100%;margin:0;background:linear-gradient(180deg,#040404 0%,#0b0b0b 100%);color:#f3f3f3;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;overflow-x:hidden}
    img{max-width:100%;display:block}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1220px;margin:0 auto;padding:28px 20px 36px}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
    .title{font-family:Poppins,Inter,sans-serif;font-weight:800;font-size:clamp(1.45rem,3vw,2rem);letter-spacing:-0.03em}
    .subtitle{color:var(--muted);font-size:0.95rem;margin-top:5px;max-width:62ch}

    .controls,.card,.lightbox-inner{background:#101010;border:1px solid var(--border);box-shadow:0 18px 50px rgba(0,0,0,0.28)}
    .controls{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;align-items:center;padding:14px;border-radius:20px}
    .folders{display:flex;gap:10px;flex-wrap:wrap;flex:1 1 auto}
    .folder{background:rgba(255,255,255,0.02);border:1px solid var(--border);padding:8px 14px;border-radius:999px;cursor:pointer;color:var(--muted);transition:transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease}
    .folder:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.14)}
    .folder.active{background:rgba(255,122,61,0.12);border-color:rgba(255,122,61,0.24);color:#fff;font-weight:700}
    .search{margin-left:auto;min-width:240px;flex:1 1 320px}
    input.search-input{width:100%;padding:12px 15px;border-radius:999px;border:1px solid var(--border);background:rgba(0,0,0,0.28);color:inherit;outline:none}
    input.search-input::placeholder{color:#7f7f7f}
    input.search-input:focus{box-shadow:0 0 0 4px rgba(255,122,61,0.1);border-color:var(--accent-600)}
    .status{width:100%;display:flex;justify-content:space-between;align-items:center;gap:12px;color:var(--muted);font-size:.9rem}

    .wrap{max-width:980px;margin:0 auto;padding:20px 16px 28px}
    /* Classic simple gallery: larger square tiles, moderate gaps, rounded corners */
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:18px;justify-content:center}
    .card{border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:transform 180ms ease,box-shadow 180ms ease;margin:0;border:1px solid rgba(255,255,255,0.04);background:var(--card)}
    .card .inner{width:100%;height:100%;display:flex;flex-direction:column}
    /* presentation items use the same styling as other cards */
    .card:hover{transform:translateY(-4px);box-shadow:0 14px 28px rgba(0,0,0,0.34);border-color:rgba(255,255,255,0.14)}
    /* Thumbnails: use flyer-like aspect and fill the box */
    .img-wrap{position:relative;overflow:hidden;background:transparent;padding:0;display:flex;align-items:center;justify-content:center;aspect-ratio:4/3}
    .img-wrap img{position:relative;z-index:1;display:block;width:100%;height:100%;object-fit:cover;transition:transform 180ms ease, filter 180ms ease;border-radius:8px}
    .card:hover .img-wrap img{transform:scale(1.04)}
    .card:hover .img-wrap img{transform:scale(1.02)}
    .card-body{padding:8px 10px;display:flex;flex-direction:column;gap:6px;align-items:center;text-align:center}
    .card-title{font-weight:700;margin:0;font-size:0.95rem;letter-spacing:-0.01em}
    .card-text{margin:0;color:var(--muted);font-size:0.78rem;line-height:1.2;display:block;max-height:2.4em;overflow:hidden;text-overflow:ellipsis}
    .card-actions{display:flex;gap:6px;margin-top:6px;align-items:center}
    .btn.small{padding:6px 8px;font-size:0.78rem;border-radius:8px}
    .card{background:transparent;border:1px solid rgba(255,255,255,0.03)}
    /* smaller, clearer presentation cards */
    .card.presentation{max-width:420px;margin:0 auto}
    .card.presentation .img-wrap{aspect-ratio:16/9}
    .card.presentation .img-wrap img{object-fit:contain}
    .card:hover{transform:translateY(-6px);box-shadow:0 10px 24px rgba(0,0,0,0.45);border-color:rgba(255,255,255,0.06)}
    .card-actions{display:flex;gap:7px;margin-top:6px;flex-wrap:wrap}
    .btn{padding:7px 11px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:inherit;cursor:pointer;text-decoration:none;transition:transform 160ms ease, background 160ms ease, border-color 160ms ease;font-size:0.85rem}
    .btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,0.14);background:rgba(255,255,255,0.05)}
    .btn.primary{background:linear-gradient(135deg, var(--accent), #ff944f);border-color:rgba(255,122,61,0.3);color:#111;font-weight:700}
    .btn.primary:hover{background:linear-gradient(135deg, #ff8858, #ffa35f)}
    .btn:focus{outline:3px solid rgba(255,122,61,0.16);outline-offset:2px}
    a.btn, .btn { text-decoration: none; }
    a.btn:hover, a.btn:focus, .btn:hover, .btn:focus { text-decoration: none; }

    /* lightbox */
    .lightbox{position:fixed;inset:0;background:rgba(2,2,2,0.85);display:none;align-items:center;justify-content:center;z-index:1200;padding:20px}
    .lightbox.show{display:flex;animation:lbFade .18s ease}
    .lightbox-inner{max-width:1100px;max-height:min(90vh,1000px);width:100%;display:flex;flex-direction:column;gap:12px;padding:16px;border-radius:22px;background:#101010;border:1px solid rgba(255,255,255,0.08);box-shadow:0 26px 80px rgba(0,0,0,0.65)}
    .lightbox-inner .lb-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 8px;border-radius:10px;background:transparent}
    .lb-title{font-weight:700;color:#fff;min-width:0;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    #lbTitle{min-width:0;overflow-wrap:anywhere}
    .lb-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .viewer-stage{min-height:0;border-radius:14px;padding:0;background:#050505;border:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .lightbox-img{position:relative;z-index:1;display:block;width:auto;height:auto;max-width:100%;max-height:78vh;object-fit:contain;border-radius:8px;filter:none;cursor:zoom-in;transition:transform 160ms ease}
    .lightbox-img.zoomed{cursor:grab}
    .lightbox-img.zoomed:active{cursor:grabbing}
    .viewer-details{display:flex;flex-direction:column;gap:10px;padding:2px 2px 0}
    .lightbox-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .lightbox-meta{color:var(--muted)}
    .lightbox-meta strong{display:block;font-family:Poppins,Inter,sans-serif;font-size:1.15rem;color:#fff;letter-spacing:-0.02em;margin-bottom:6px}
    .meta-chip{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border-radius:999px;background:rgba(255,122,61,0.1);border:1px solid rgba(255,122,61,0.18);color:#ffd5c4;font-size:.8rem;text-transform:uppercase;letter-spacing:.08em}
    .meta-copy{margin:0;color:var(--muted);line-height:1.75}
    .lightbox-close{background:rgba(255,255,255,0.03);border:1px solid var(--border);color:inherit;padding:8px 11px;border-radius:12px;cursor:pointer}
    .viewer-actions{display:flex;gap:10px;flex-wrap:wrap}
    .nav-arrows{position:absolute;inset:auto 12px 12px 12px;display:flex;align-items:center;justify-content:space-between;pointer-events:none}
    .nav-arrows button{pointer-events:auto;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.06);color:#fff;padding:14px 16px;border-radius:14px;cursor:pointer;font-size:1.05rem}
    .nav-arrows button:hover{background:rgba(0,0,0,0.75)}

    footer{margin-top:24px;color:var(--muted);font-size:0.9rem}

    @media (max-width:900px){
      .lightbox-img{max-height:60vh}
      .lightbox-inner .lb-toolbar{align-items:flex-start;gap:12px}
      .lb-actions .btn,.lb-actions .lightbox-close{padding:8px 10px}
    }
    @media (max-width:720px){
      .wrap{padding-inline:14px}
      .search{min-width:100%}
      .folders{width:100%}
      .folder{padding-inline:13px}
      .nav-arrows{inset:auto 12px 12px 12px}
      .lightbox{padding:12px}
      .lightbox-inner{padding:12px;border-radius:20px;max-height:calc(100vh - 24px)}
      .lightbox-inner .lb-toolbar{flex-direction:column;align-items:stretch}
      .lb-actions{justify-content:flex-start}
      .viewer-details{padding:2px}
      .meta-copy{font-size:.95rem;line-height:1.6}
      .controls,.card,.lightbox-inner{box-shadow:0 16px 36px rgba(0,0,0,0.35)}
    }
    @media (max-width:560px){
      .lightbox{padding:8px}
      .lightbox-inner{padding:10px;border-radius:16px;gap:10px;max-height:calc(100vh - 16px)}
      .meta-chip{font-size:.72rem;padding:6px 9px}
      #lbTitle{font-size:1.05rem;line-height:1.25}
      .lb-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));width:100%;gap:8px}
      .lb-actions .btn,.lb-actions .lightbox-close{width:100%;justify-content:center}
      #lbDownload{order:1}
      #lbZoom{order:2}
      #lbFit{order:3}
      #lbExternal{order:4}
      #lbClose{order:5;grid-column:1 / -1}
      .viewer-stage{border-radius:12px}
      .lightbox-img{max-height:50vh}
      .meta-copy{font-size:.9rem;line-height:1.55}
      .nav-arrows button{padding:11px 13px;border-radius:12px;font-size:.96rem}
    }
    @media (max-width:390px){
      .lb-actions{grid-template-columns:1fr}
      .lightbox-img{max-height:46vh}
      .meta-copy{font-size:.86rem}
    }

    @keyframes lbFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="title">Graphic Design Gallery</div>
        <div class="subtitle">Simple, responsive, and fully featured with folders, search, preview, and download.</div>
      </div>
      <div>
        <a href="index.html" class="btn">Back</a>
      </div>
    </header>

    <div class="controls" role="region" aria-label="Gallery controls">
      <div class="folders" id="folderButtons"></div>
      <div class="search"><input id="search" class="search-input" type="search" placeholder="Search titles or descriptions"></div>
      <div class="status"><span id="activeFolderLabel"></span><span id="resultLabel"></span></div>
    </div>

    <main>
      <div class="grid" id="grid"></div>
      <div id="empty" style="display:none;margin-top:18px;color:var(--muted)">No results</div>
    </main>

    <footer>Tip: click any image to open full-screen. Use left/right arrows or arrow keys to navigate.</footer>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-inner" role="dialog" aria-modal="true" aria-label="Design preview">
        <div class="lb-toolbar">
          <div class="lb-title"><span class="meta-chip" id="lbFolder">Preview</span> <span id="lbTitle"></span></div>
          <div class="lb-actions">
            <button id="lbZoom" class="btn" aria-label="Toggle zoom">Zoom</button>
            <button id="lbFit" class="btn" aria-label="Fit to screen">Fit</button>
            <a id="lbDownload" class="btn primary" download>Download</a>
            <a id="lbExternal" class="btn" target="_blank" rel="noopener noreferrer" style="display:none">Open external</a>
            <button id="lbClose" class="lightbox-close" aria-label="Close">✕</button>
          </div>
        </div>
        <div class="viewer-stage">
          <img id="lbImg" class="lightbox-img" src="" alt="">
        </div>
        <div class="viewer-details">
          <div class="lightbox-top">
            <div class="lightbox-meta">
              <div id="lbText" class="meta-copy"></div>
            </div>
          </div>
        </div>
    </div>
    <div class="nav-arrows">
      <button id="prev">◀</button>
      <button id="next">▶</button>
    </div>
  </div>

  <script>
    // Data copied from index.html galleryFolders
    const designGalleryBase = 'images/design gallery';
    const designGallerySrc = (fileName) => `${designGalleryBase}/${encodeURIComponent(fileName)}`;
    const galleryFolders = [
      { key: 'logo', label: 'Logo', items: [ { src: designGallerySrc('logo1.png'), title: 'Cricket Medal Badge', text: 'Ordered by the client through Malarani Mobile Centre.' }, { src: designGallerySrc('logo2.png'), title: 'Deepjyoti Sathi Sanjal', text: 'Ordered by Deepjyoti Sathi Sanjal via direct contact.' } ] },
      { key: 'banners', label: 'Banners', items: [ { src: designGallerySrc('banner1.png'), title: 'Deepjyoti Sathi Sanjal Program banner', text: 'Ordered by direct contact.' }, { src: designGallerySrc('banner2.png'), title: 'Admission banner', text: 'Ordered by Hansapur Public English Boarding School.' } ] },
      { key: 'certificates', label: 'Certificates', items: [ { src: designGallerySrc('certificate1.png'), title: 'Volleyball Certificate', text: 'Ordered by Thapkot Yuwa Samaj through Malarani Mobile Centre.' }, { src: designGallerySrc('certificate2.png'), title: 'Cricket Certificate', text: 'Ordered by New RTM Club through direct contact.' } ] },
      { key: 'birthday-frames', label: 'Birthday Frames', items: [ { src: designGallerySrc('Birthdayframe -malarani mobile client project.png'), title: 'Happy Birthday (Calendar design)', text: 'Ordered by Malarani Mobile Centre.' }, { src: designGallerySrc('frame--first blessing.png'), title: '1st Birthday Viral Frame', text: 'Ordered by Malarani Mobile Centre.' } ] },
      { key: 'flyers', label: 'Flyers', items: [ { src: designGallerySrc('flyer1.png'), title: 'Lenevo Legion 5', text: 'Designed in internship program.' }, { src: designGallerySrc('flyer2.png'), title: 'Xtrike Me Transparent Mouse', text: 'Designed during internship.' } ] },
      { key: 'presentation', label: 'Presentation', items: [ { src: designGallerySrc('presentation1.png'), title: 'Butwal Hacks Attendance System', text: 'Design and Presented in class 10 Technical Project', href: 'https://canva.link/nbg97dptjctne5g', external: true } ] },
      { key: 'others', label: 'Others', items: [ { src: designGallerySrc('others1.png'), title: 'Bibaha Card', text: 'Design for Class 10 Nepali Project Work' }, { src: designGallerySrc('others2.png'), title: 'Website launched', text: 'Ordered by Hansapur Public English Boarding School.' } ] }
    ];

    const folderButtons = document.getElementById('folderButtons');
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const empty = document.getElementById('empty');

    let activeKey = galleryFolders[0].key;
    let itemsFlat = [];
    let currentIndex = 0;
    const activeFolderLabel = document.getElementById('activeFolderLabel');
    const resultLabel = document.getElementById('resultLabel');

    function build() {
      // populate folder buttons
      folderButtons.innerHTML = '';
      galleryFolders.forEach((f) => {
        const btn = document.createElement('button');
        btn.className = 'folder';
        btn.textContent = f.label;
        btn.dataset.key = f.key;
        if (f.key === activeKey) btn.classList.add('active');
        btn.addEventListener('click', () => { activeKey = f.key; document.querySelectorAll('.folder').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); });
        folderButtons.appendChild(btn);
      });

      // flatten items with folder reference
      itemsFlat = galleryFolders.flatMap(f => f.items.map(it => ({...it, folder: f.key, folderLabel: f.label}))); 
      render();
    }

    function render() {
      const q = (search.value || '').trim().toLowerCase();
      const folder = activeKey;
      const filtered = itemsFlat.filter(it => it.folder === folder && ((it.title + ' ' + it.text).toLowerCase().includes(q)));
      grid.innerHTML = '';
      if (filtered.length === 0) { empty.style.display='block'; } else { empty.style.display='none'; }
      const activeFolder = galleryFolders.find(f => f.key === folder);
      activeFolderLabel.textContent = activeFolder ? activeFolder.label : '';
      resultLabel.textContent = q ? `${filtered.length} results for "${search.value.trim()}"` : `${filtered.length} designs`;
        filtered.forEach((it, i) => {
          const card = document.createElement('article');
          card.className = 'card' + (it.folder === 'presentation' ? ' presentation' : '');
          card.innerHTML = `
            <div class="inner">
              <div class="img-wrap">
                <img loading="lazy" src="${it.src}" alt="${it.title}">
              </div>
              <div class="card-body">
                <h4 class="card-title">${it.title}</h4>
                <p class="card-text">${it.text}</p>
              </div>
            </div>
          `;
          grid.appendChild(card);
          // open lightbox on card click
          card.addEventListener('click', (event) => {
            if (event.target.closest('a')) return;
            openLightbox(filtered, i);
          });
        });
    }

    // Lightbox
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbTitle = document.getElementById('lbTitle');
    const lbText = document.getElementById('lbText');
    const lbClose = document.getElementById('lbClose');
    const lbDownload = document.getElementById('lbDownload');
    const lbExternal = document.getElementById('lbExternal');
    const lbFolder = document.getElementById('lbFolder');
    const btnPrev = document.getElementById('prev');
    const btnNext = document.getElementById('next');

    let lbList = [];
    // lightbox transform state
    let scale = 1, minScale = 1, maxScale = 4, startX = 0, startY = 0, translateX = 0, translateY = 0, isPanning = false;
    const lbZoom = document.getElementById('lbZoom');
    const lbFit = document.getElementById('lbFit');

    function applyTransform(){ lbImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }
    function resetTransform(){ scale = 1; translateX = 0; translateY = 0; lbImg.classList.remove('zoomed'); applyTransform(); lbImg.style.cursor = 'zoom-in'; }

    function openLightbox(list, idx){ lbList = list; currentIndex = idx; showCurrent(); lb.classList.add('show'); lb.setAttribute('aria-hidden','false'); document.body.style.overflow='hidden'; }
    function closeLightbox(){ lb.classList.remove('show'); lb.setAttribute('aria-hidden','true'); document.body.style.overflow=''; resetTransform(); }
    function showCurrent(){ const it = lbList[currentIndex]; if(!it) return; lbImg.src = it.src; lbImg.alt = it.title; document.getElementById('lbTitle').textContent = it.title; document.getElementById('lbText').textContent = it.text; lbFolder.textContent = it.folderLabel || 'Preview'; lbDownload.href = it.src; lbExternal.style.display = it.href ? 'inline-flex' : 'none'; if(it.href) lbExternal.href = it.href; resetTransform(); }
    function prev(){ currentIndex = (currentIndex-1+lbList.length)%lbList.length; showCurrent(); }
    function next(){ currentIndex = (currentIndex+1)%lbList.length; showCurrent(); }

    // zoom toggle
    lbZoom.addEventListener('click', ()=>{
      if(scale > 1){ resetTransform(); } else { scale = 2; lbImg.classList.add('zoomed'); lbImg.style.cursor='grab'; applyTransform(); }
    });
    lbFit.addEventListener('click', ()=>{ resetTransform(); });

    // double-click to toggle zoom
    lbImg.addEventListener('dblclick', (e)=>{ if(scale>1) resetTransform(); else { scale=2; lbImg.classList.add('zoomed'); lbImg.style.cursor='grab'; applyTransform(); } });

    // wheel to zoom
    lbImg.addEventListener('wheel', (e)=>{
      if(!e.ctrlKey){ e.preventDefault(); const delta = -e.deltaY * 0.0015; const newScale = Math.min(maxScale, Math.max(minScale, scale + delta)); if(newScale===scale) return; // adjust translate so zoom centers at cursor
        const rect = lbImg.getBoundingClientRect(); const cx = e.clientX - rect.left; const cy = e.clientY - rect.top; const dx = (cx - rect.width/2 - translateX) / scale; const dy = (cy - rect.height/2 - translateY) / scale; translateX -= dx * (newScale - scale); translateY -= dy * (newScale - scale); scale = newScale; lbImg.classList.toggle('zoomed', scale>1); applyTransform(); }
    }, { passive:false });

    // drag to pan when zoomed
    lbImg.addEventListener('mousedown', (e)=>{ if(scale<=1) return; isPanning=true; startX = e.clientX - translateX; startY = e.clientY - translateY; lbImg.style.cursor='grabbing'; e.preventDefault(); });
    window.addEventListener('mousemove', (e)=>{ if(!isPanning) return; translateX = e.clientX - startX; translateY = e.clientY - startY; applyTransform(); });
    window.addEventListener('mouseup', ()=>{ if(isPanning){ isPanning=false; lbImg.style.cursor='grab'; } });


    lbClose.addEventListener('click', closeLightbox);
    btnPrev.addEventListener('click', prev);
    btnNext.addEventListener('click', next);
    lb.addEventListener('click', (e)=>{ if(e.target===lb) closeLightbox(); });
    document.addEventListener('keydown', (e)=>{ if(lb.classList.contains('show')){ if(e.key==='ArrowLeft') prev(); if(e.key==='ArrowRight') next(); if(e.key==='Escape') closeLightbox(); } });

    search.addEventListener('input', render);

    // initialize
    build();

    // ensure responsiveness on resize: nothing required but keep images crisp
    window.addEventListener('resize', ()=>{});
  </script>
</body>
</html>
